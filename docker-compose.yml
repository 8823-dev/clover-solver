services:
  app:
    build:
      context: .
      target: deps
    command: yarn dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: "development"
      NEXT_TELEMETRY_DISABLED: "1"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4-mini}"
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
